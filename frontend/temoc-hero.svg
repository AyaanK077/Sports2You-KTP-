<svg viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="atmosphericBlur">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#39d98a" flood-opacity="0.08" result="greenGlow"/>
      <feComposite in="greenGlow" in2="blur" operator="in" result="greenBlur"/>
      <feFlood flood-color="#f47c20" flood-opacity="0.12" result="orangeGlow"/>
      <feComposite in="orangeGlow" in2="blur" operator="in" result="orangeBlur"/>
      <feMerge>
        <feMergeNode in="greenBlur"/>
        <feMergeNode in="orangeBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="orangeGradient" cx="40%" cy="30%">
      <stop offset="0%" style="stop-color:#f47c20;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f47c20;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="greenGradient" cx="60%" cy="70%">
      <stop offset="0%" style="stop-color:#39d98a;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#39d98a;stop-opacity:0" />
    </radialGradient>

    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a86d;stop-opacity:0.95" />
      <stop offset="50%" style="stop-color:#d4924a;stop-opacity:0.92" />
      <stop offset="100%" style="stop-color:#8b5a2b;stop-opacity:0.88" />
    </linearGradient>

    <filter id="spotShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Atmospheric background glow -->
  <circle cx="600" cy="400" r="900" fill="url(#orangeGradient)" opacity="0.15"/>
  <circle cx="700" cy="600" r="800" fill="url(#greenGradient)" opacity="0.12"/>

  <!-- Main body group with tilt -->
  <g transform="translate(650, 500) rotate(-15) translate(-200, -100)" opacity="0.92" filter="url(#atmosphericBlur)">
    
    <!-- Soft body shadow -->
    <ellipse cx="180" cy="280" rx="160" ry="180" fill="#000" opacity="0.08" filter="url(#spotShadow)"/>
    
    <!-- Main body -->
    <ellipse cx="180" cy="260" rx="155" ry="175" fill="url(#bodyGradient)" opacity="0.9"/>
    
    <!-- Chest accent - lighter -->
    <ellipse cx="180" cy="300" rx="95" ry="110" fill="#e8c4a0" opacity="0.7"/>
    
    <!-- Back leg (far, slightly visible) -->
    <ellipse cx="100" cy="380" rx="45" ry="90" fill="#8b5a2b" opacity="0.6" transform="rotate(-20 100 380)"/>
    
    <!-- Front legs -->
    <g>
      <!-- Left front leg -->
      <rect x="130" y="380" width="50" height="110" rx="25" fill="#d4924a" opacity="0.85"/>
      <ellipse cx="155" cy="495" rx="28" ry="35" fill="#8b5a2b" opacity="0.7"/>
      
      <!-- Right front leg -->
      <rect x="210" y="380" width="50" height="110" rx="25" fill="#d4924a" opacity="0.85"/>
      <ellipse cx="235" cy="495" rx="28" ry="35" fill="#8b5a2b" opacity="0.7"/>
    </g>
    
    <!-- Tail - flowing behind -->
    <path d="M 100 200 Q 50 150 40 80 Q 35 40 60 20" 
          stroke="#c9934e" stroke-width="50" fill="none" stroke-linecap="round" opacity="0.75" filter="url(#spotShadow)"/>
    <path d="M 100 200 Q 50 150 40 80 Q 35 40 60 20" 
          stroke="#f47c20" stroke-width="24" fill="none" stroke-linecap="round" opacity="0.4"/>
    
    <!-- Head -->
    <g transform="translate(200, 80)">
      <!-- Head shape - slightly tilted -->
      <ellipse cx="0" cy="0" rx="95" ry="100" fill="url(#bodyGradient)" opacity="0.92" transform="rotate(-8)"/>
      
      <!-- Snout -->
      <ellipse cx="20" cy="35" rx="55" ry="50" fill="#e8c4a0" opacity="0.75"/>
      
      <!-- Nose -->
      <ellipse cx="25" cy="45" rx="18" ry="16" fill="#4a3728" opacity="0.8"/>
      
      <!-- Mouth line - subtle -->
      <path d="M 10 50 Q 25 58 40 50" stroke="#5a4738" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
      
      <!-- Left ear -->
      <ellipse cx="-60" cy="-45" rx="35" ry="50" fill="#d4924a" opacity="0.85" transform="rotate(-30 -60 -45)"/>
      <ellipse cx="-60" cy="-42" rx="20" ry="30" fill="#e8c4a0" opacity="0.6" transform="rotate(-30 -60 -42)"/>
      
      <!-- Right ear -->
      <ellipse cx="60" cy="-50" rx="35" ry="50" fill="#d4924a" opacity="0.85" transform="rotate(25 60 -50)"/>
      <ellipse cx="60" cy="-48" rx="20" ry="30" fill="#e8c4a0" opacity="0.6" transform="rotate(25 60 -48)"/>
      
      <!-- Left eye -->
      <circle cx="-25" cy="-15" r="16" fill="#2a1810" opacity="0.9"/>
      <circle cx="-22" cy="-18" r="6" fill="#fff" opacity="0.7"/>
      <circle cx="-20" cy="-16" r="3" fill="#2a1810" opacity="0.9"/>
      
      <!-- Right eye -->
      <circle cx="25" cy="-12" r="16" fill="#2a1810" opacity="0.9"/>
      <circle cx="28" cy="-15" r="6" fill="#fff" opacity="0.7"/>
      <circle cx="30" cy="-13" r="3" fill="#2a1810" opacity="0.9"/>
      
      <!-- Subtle expression softness - eyebrows area glow -->
      <ellipse cx="-25" cy="-28" rx="22" ry="10" fill="#f47c20" opacity="0.15"/>
      <ellipse cx="25" cy="-25" rx="22" ry="10" fill="#f47c20" opacity="0.15"/>
    </g>
    
    <!-- Spots on body - soft leopard pattern -->
    <g opacity="0.4">
      <!-- Shoulder spots -->
      <circle cx="140" cy="160" r="24" fill="#5a3a1a"/>
      <circle cx="220" cy="150" r="20" fill="#5a3a1a"/>
      
      <!-- Body spots -->
      <circle cx="160" cy="240" r="18" fill="#5a3a1a"/>
      <circle cx="200" cy="260" r="22" fill="#5a3a1a"/>
      <circle cx="150" cy="320" r="16" fill="#5a3a1a"/>
      <circle cx="210" cy="340" r="20" fill="#5a3a1a"/>
    </g>
    
    <!-- Green accent glow on spots -->
    <g opacity="0.25">
      <circle cx="160" cy="240" r="22" fill="#39d98a"/>
      <circle cx="200" cy="260" r="24" fill="#39d98a"/>
    </g>
    
    <!-- Subtle orange rim light effect -->
    <ellipse cx="180" cy="200" rx="170" ry="190" fill="none" stroke="#f47c20" stroke-width="8" opacity="0.12"/>
  </g>

  <!-- Outer atmospheric haze -->
  <ellipse cx="600" cy="500" rx="700" ry="650" fill="none" stroke="#f47c20" stroke-width="120" opacity="0.04" filter="url(#spotShadow)"/>
  <ellipse cx="650" cy="550" rx="650" ry="700" fill="none" stroke="#39d98a" stroke-width="100" opacity="0.03" filter="url(#spotShadow)"/>

</svg>
